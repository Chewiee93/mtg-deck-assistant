<!DOCTYPE html>
<html>
<head>
    <title>{{ set_code }} Cards</title>

    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/components.css">
    <link rel="stylesheet" href="/static/features.css">
</head>

<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/sets">Sets</a>
</div>

<h1>{{ set_code }} – Cards</h1>

<div class="section">

    <select id="typeFilter" class="input">
        <option value="">All Types</option>
        <option value="Creature">Creature</option>
        <option value="Land">Land</option>
        <option value="Instant">Instant</option>
        <option value="Sorcery">Sorcery</option>
        <option value="Artifact">Artifact</option>
        <option value="Enchantment">Enchantment</option>
        <option value="Planeswalker">Planeswalker</option>
    </select>

</div>

<div class="section">
    <div class="grid">

        {% for card in cards %}
        <div class="grid-card"
            data-type="{{ card.type_line }}"
            data-name="{{ card.name | lower }}"
            data-preview="{{ card.image_uris.normal if card.image_uris else '' }}">

            {% if card.image_uris %}
                <img src="{{ card.image_uris.normal }}">
            {% elif card.card_faces and card.card_faces[0].image_uris %}
                <img src="{{ card.card_faces[0].image_uris.normal }}">
            {% else %}
                <img src="/static/placeholder.jpg">
            {% endif %}

            <div class="card-info">
                <strong>{{ card.name }}</strong>
            </div>

            <div class="card-actions">
                <button class="add-set-card-btn" data-name="{{ card.name }}">
                    ➕
                </button>
            </div>

        </div>
        {% endfor %}

        {% if has_more %}
        <div class="section" style="text-align:center;">
            <button 
                class="button load-more-btn"
                data-next="{{ next_page }}">
                Load More →
            </button>
        </div>
        {% endif %}

    </div>
</div>

<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
