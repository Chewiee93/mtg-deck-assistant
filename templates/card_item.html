<div id="card-{{ card.id }}" class="grid-card {% if card.owned == 0 %}missing{% endif %}">

    {% if card.image_url %}
        <img src="{{ card.image_url }}">
    {% endif %}

    <div class="card-info">
        <strong>{{ card.name }}</strong><br>
        x{{ card.quantity }}
        
            <div class="card 
                {% if deck.commander and card.name == deck.commander %}
                    commander-card
                {% endif %}
            "></div>

        {% if card.owned == 0 %}
            <div class="missing-text">Missing</div>
        {% endif %}
    </div>

    <div class="card-meta">
        CMC: {{ card.cmc }}
    </div>

    <div class="card-actions">
        <button onclick="removeCard({{ deck.id }}, {{ card.id }})">❌</button>

        {% if card.owned == 0 %}
            <button onclick="markOwned({{ card.id }})">✔</button>
        {% endif %}
    </div>

</div>
