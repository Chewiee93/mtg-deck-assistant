<!-- =========================
     CARD ITEM (Reusable Component)
     Used in deck views
     ========================= -->

<div id="card-{{ card.id }}"
     class="grid-card
     {% if card.owned == 0 %}missing{% endif %}
     {% if deck.format == "commander" and card.name == commander_name %}commander-card{% endif %}"
     data-name="{{ card.name | lower }}"
     data-color="{{ card.color_identity }}"
     data-image="{{ card.image_url }}"
     data-preview="{{ card.image_large or card.image_url }}">

    <!-- =========================
         CARD IMAGE
         ========================= -->
    {% if card.image_url %}
        <img 
            src="{{ card.image_url if card.image_url else '/static/placeholder.jpg' }}" 
            alt="{{ card.name }}">
    {% endif %}

    <!-- =========================
         CARD INFO
         ========================= -->
    <div class="card-info">
        <strong>{{ card.name }}</strong><br>
        x{{ card.quantity }}

        {% if card.owned == 0 %}
            <div class="missing-text">Missing</div>
        {% endif %}
    </div>

    <!-- =========================
         CARD META (CMC etc.)
         ========================= -->
    <div class="card-meta">
        CMC: {{ card.cmc }}
    </div>

    <!-- =========================
         ACTION BUTTONS
         ========================= -->
    <div class="card-actions">
        <button data-action="remove" title="Remove">🗑</button>

        {% if card.owned == 0 %}
            <button data-action="owned" title="Mark Owned">✔</button>
        {% endif %}

        {% if deck.format == "commander" %}
            <button 
                data-action="set-commander"
                data-deck="{{ deck.id }}"
                data-card="{{ card.name }}"
                title="Set Commander">
                👑
            </button>
        {% endif %}
    </div>

</div>
