<!-- =========================
     CARD ITEM (Reusable Component)
     Used in deck views
     ========================= -->

<div id="card-{{ card.id }}"
     class="grid-card
     {% if card.owned == 0 %}missing{% endif %}
     {% if commander_name and card.name == commander_name %}commander-card{% endif %}">

    <!-- =========================
         CARD IMAGE
         ========================= -->
    {% if card.image_url %}
        <img 
            src="{{ card.image_url }}" 
            alt="{{ card.name }}"
        >
    {% endif %}

    <!-- =========================
         CARD INFO
         ========================= -->
    <div class="card-info">
        <strong>{{ card.name }}</strong><br>
        x{{ card.quantity }}

        {% if card.owned == 0 %}
            <div class="missing-text">Missing</div>
        {% endif %}
    </div>

    <!-- =========================
         CARD META (CMC etc.)
         ========================= -->
    <div class="card-meta">
        CMC: {{ card.cmc }}
    </div>

    <!-- =========================
         ACTION BUTTONS
         ========================= -->
    <div class="card-actions">
        <button data-action="remove" title="Remove">🗑</button>

        {% if card.owned == 0 %}
        <button data-action="owned" title="Mark Owned">✔</button>
        {% endif %}

        {% if commander_name %}
        <button data-action="set-commander" title="Set Commander">👑</button>
        {% endif %}
    </div>

</div>
