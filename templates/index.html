<!DOCTYPE html>
<html>
<head>

    <!-- =========================
         PAGE SETUP
         ========================= -->
    <title>MTG Deck Builder</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/collection">Collection</a>
    <a href="/import">Import</a>
</div>

<!-- =========================
     OVERLAY (for modals)
     ========================= -->
<div id="overlay" class="hidden" onclick="UI.closeAll()"></div>


<!-- =========================
     PAGE TITLE
     ========================= -->
<h1>MTG Deck Builder</h1>


<!-- =========================
     ADD CARD SECTION
     ========================= -->
<div class="section">
    <h2>Add Card</h2>

    <!-- Opens modal -->
    <button class="button" onclick="UI.openModal('cardModal')">
        Add Card
    </button>
</div>


<!-- =========================
     COLLECTION SECTION
     ========================= -->
<div class="section">

    <h2>Your Collection</h2>

    <!-- ===== Filters ===== -->
    <div class="flex mb-15">

        <!-- Search -->
        <input 
            id="searchInput" 
            placeholder="Search cards..."
            class="input"
        >

        <!-- Color filter -->
        <select id="colorFilter" class="input">
            <option value="">All Colors</option>
            <option value="R">Red</option>
            <option value="U">Blue</option>
            <option value="G">Green</option>
            <option value="B">Black</option>
            <option value="W">White</option>
        </select>

    </div>


    <!-- ===== Card Grid ===== -->
    <div id="collection">

        {% for card in cards %}
        <div 
            id="card-{{ card.id }}"
            class="card"
            data-name="{{ card.name | lower }}"
            data-color="{{ card.color_identity }}"
            data-image="{{ card.image_url }}"
            data-preview="{{ card.image_large or card.image_url }}"
            onclick="UI.preview(this)"
        >

            <!-- Card Image -->
            {% if card.image_url %}
                <img src="{{ card.image_url }}" 
                class="card-img"
                onerror="this.src='H:\Craig\mtg-deck-assisstant\static\Placeholder.webp'"
                >
            {% endif %}

            <!-- Card Name -->
            <strong  class="card-info">
                {{ card.name }}
            </strong>

            <!-- Quantity Controls -->
            <div class="card-controls">

                <button onclick="event.stopPropagation(); API.updateQuantity({{ card.id }}, -1)">-</button>

                <span id="qty-{{ card.id }}">
                    {{ card.quantity }}
                </span>

                <button onclick="event.stopPropagation(); API.updateQuantity({{ card.id }}, 1)">+</button>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

<!-- =========================
     CREATE DECK
     ========================= -->
<div class="section">
    <h2>Create Deck</h2>

    <form action="/create_deck" method="POST" class="form-inline">
        <input 
            name="deck_name" 
            placeholder="Deck name"
            required
            class="input"
        >
        <select name="format">
            <option value="casual">Casual</option>
            <option value="standard">Standard</option>
            <option value="modern">Modern</option>
            <option value="commander">Commander</option>
        </select>

        <button class="button" type="submit">
            Create
        </button>
    </form>

    <div class="section">
    <h2>Decks</h2>

    <div class="grid">
        {% for deck in decks %}
        <div class="grid-card deck-card"
            onclick="window.location='/deck/{{ deck.id }}'">

            <img src="{{ deck.image }}">

            <div class="card-info">
                <strong>{{ deck.name }}</strong>
            </div>

            <div class="mt-6">
                <a class="button" href="/delete_deck/{{ deck.id }}"
                onclick="event.stopPropagation()">Delete</a>
            </div>

        </div>
        {% endfor %}
    </div>
</div>

<!-- =========================
    Import Deck
    ========================== -->

<div class="section">
    <h2>Import Deck</h2>

    <form action="/import_deck" method="POST">

        <!-- Deck name -->
        <input 
            name="deck_name" 
            placeholder="Deck name"
            required
            class="input"
        >

        <br><br>

        <!-- Deck list -->
        <!-- =========================
            IMPORT WITH AUTOSUGGEST
            ========================= -->
        <div class="input-wrapper">

            <textarea 
                id="deckInput"
                name="deck_list" 
                rows="12"
                class="textarea"
                >
            </textarea>

            <!-- Suggestions -->
            <div id="importSuggestions" class="suggestions-box hidden"></div>

        </div>

        <br><br>

        <!-- OWNERSHIP TOGGLE -->
        <label>
            <input type="checkbox" name="all_owned" value="1" checked style="cursor:pointer;">
            I own all these cards
        </label>

        <br><br>

        <button class="button" type="submit">
            Import Deck
        </button>

    </form>
</div>


<!-- =========================
     MODALS
     ========================= -->
<div id="cardModal" class="modal hidden">
<!-- ===== Add Card Modal ===== -->

    <h3>Add Card</h3>

    <!-- =========================
     CARD INPUT WITH AUTOSUGGEST
     ========================= -->
    <div class="input-wrapper">

        <input 
            id="cardInput" 
            placeholder="Enter card name"
            autocomplete="off"
        >

        <!-- Suggestions dropdown -->
        <div id="suggestionsBox" class="suggestions-box hidden"></div>

    </div>

    <br><br>

    <button class="button" onclick="API.addCard()">Add</button>

    <br><br>

    <button class="button" onclick="UI.closeModal('cardModal')">Close</button>
</div>


<!-- ===== Preview Modal ===== -->
<div id="previewModal" class="modal hidden preview-modal"
onclick="event.stopPropagation()">

    <img id="previewImage"
        onerror="this.src='/static/Placeholder.webp'"
    >

</div>


<!-- =========================
     CONFIG (FROM FLASK)
     ========================= -->
<script>
    window.APP_CONFIG = {
        added: "{{ added }}"
    };
</script>


<!-- =========================
     MAIN SCRIPT
     ========================= -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
