<!DOCTYPE html>
<html>
<head>
    <title>MTG Sets</title>

    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/components.css">
    <link rel="stylesheet" href="/static/features.css">
</head>

<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/decks">Decks</a>
    <a href="/collection">Collection</a>
    <a href="/import">Import</a>
    <a href="/game_formats">Game Formats</a>
</div>

<h1>Magic Sets</h1>

<div class="flex mb-15">

    <!-- SEARCH -->
    <input 
        id="searchInput"
        placeholder="Search sets..."
        class="input"
    >

    <!-- SORT -->
    <select id="setSort" class="input">
        <option value="newest">Newest</option>
        <option value="az">A–Z</option>
    </select>

    <!-- YEAR FILTER -->
    <select id="yearFilter" class="input">
        <option value="">All Years</option>

        {% set years = [] %}

        {% for s in sets %}
            {% if s.released_at %}
                {% set _ = years.append(s.released_at[:4]) %}
            {% endif %}
        {% endfor %}

        {% for year in years | unique | sort(reverse=True) %}
            <option value="{{ year }}">{{ year }}</option>
        {% endfor %}
    </select>

    <!-- SET TYPE FILTER -->
     <select id="typeFilter" class="input">
        <option value="">All Types</option>
        <option value="core">Core</option>
        <option value="expansion">Expansion</option>
        <option value="masters">Masters</option>
        <option value="commander">Commander</option>
        <option value="draft_innovation">Draft</option>
        <option value="funny">Funny</option>
    </select>

    <!-- MODERN FILTER -->
    <label>
        <select id="formatFilter" class="input">
            <option value="">All Formats</option>
            <option value="modern">Modern</option>
            <option value="standard">Standard</option>
        </select>
    </label>

</div>

<div class="section">

    <div class="grid">

        {% for set in sets %}
        <a href="/set/{{ set.code }}" class="grid-card"
            data-name="{{ set.name | lower }}"
            data-code="{{ set.code | upper }}"
            data-year="{{ set.released_at[:4] if set.released_at else '' }}"
            data-type="{{ set.set_type or '' }}">

            <!-- SYMBOL -->
            {% if set.icon_svg_uri %}
                <img src="{{ set.icon_svg_uri }}" class="set-symbol">
            {% endif %}

            <!-- NAME -->
            <div class="card-info">
                <strong>{{ set.name }}</strong>
            </div>

            <!-- CODE -->
            <div class="card-meta">
                ({{ set.code | upper }})
            </div>

        </a>
        {% endfor %}

    </div>

</div>

<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
