<!DOCTYPE html>
<html>
<head>
    <title>Import Deck</title>
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/components.css">
    <link rel="stylesheet" href="/static/features.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/collection">Collection</a>
    <a href="/decks">Decks</a>
</div>

<h1>Import Deck</h1>

<div class="section">

    <div class="panel">
        <strong>How to import:</strong>
        <div>• Type in a deck name</div>
        <div>• Choose deck format</div>
        <div>• One card per line</div>
        <div>• Format: "4 Lightning Bolt"</div>
        <div>• Supports "4x" or "Card x4"</div>
        <div>• Sideboard: use "Sideboard" then type cards in lines underneath</div>
    </div>

    <form action="/import_deck" method="POST">

        <label>Deck Name</label><br>
        <input 
            type="text" 
            name="deck_name" 
            placeholder="My Awesome Deck"
            class="input"
        >

        <label>Format</label><br>
        <select name="format" class="input">
            <option value="casual">Casual</option>
            <option value="standard">Standard</option>
            <option value="modern">Modern</option>
            <option value="commander">Commander</option>
        </select>

        <br><br>

        <div class="input-wrapper">
            
            <label>Deck List</label><br>
            <textarea 
                id="deckInput"
                name="deck_list" 
                rows="20"
                cols="50"
                placeholder="4 Lightning Bolt
3 Counterspell
2 Island"
                class="input"
            ></textarea>

            <div id="cardCount" class="text-muted mt-6">
                Cards: 0
            </div>

            <div id="importSuggestions" class="suggestions-box hidden"></div>
        
        </div>

        <br><br>

        <label>
            <input type="checkbox" name="all_owned" value="1">
            I own all these cards
        </label>

        <br><br>

        <button type="submit" class="button">
            Import Deck
        </button>

    </form>

</div>

<!-- MAIN JS -->
<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
