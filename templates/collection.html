<!DOCTYPE html>
<html>
<head>

    <!-- =========================
         PAGE SETUP
         ========================= -->
    <title>MTG Deck Builder</title>

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="/static/base.css">
    <link rel="stylesheet" href="/static/layout.css">
    <link rel="stylesheet" href="/static/components.css">
    <link rel="stylesheet" href="/static/features.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

<div class="nav">
    <a href="/">Home</a>
    <a href="/decks">Decks</a>
    <a href="/import">Import</a>
    <a href="/game_formats">Game Formats</a>
    <a href="/sets">Sets</a>
</div>

<!-- =========================
     OVERLAY (for modals)
     ========================= -->
<div id="overlay" class="hidden"></div>


<!-- =========================
     PAGE TITLE
     ========================= -->
<h1>MTG Deck Builder</h1>


<!-- =========================
     ADD CARD SECTION
     ========================= -->
<div class="section">
    <h2>Add Card</h2>

    <!-- Opens modal -->
    <button class="button" data-open-modal="cardModal">
        Add Card
    </button>
</div>


<!-- =========================
     COLLECTION SECTION
     ========================= -->
<div class="section">

    <h2>Your Collection</h2>

    <!-- ===== Filters ===== -->
    <div class="flex mb-15">

        <!-- Search -->
        <input 
            id="searchInput" 
            placeholder="Search cards..."
            class="input"
        >

        <!-- Color filter -->
        <select id="colorFilter" class="input">
            <option value="">All Colors</option>
            <option value="R">Red</option>
            <option value="U">Blue</option>
            <option value="G">Green</option>
            <option value="B">Black</option>
            <option value="W">White</option>
        </select>

    </div>

    <div class="panel">
        Total cards: {{ cards | sum(attribute='quantity') }}  
        Unique cards: {{ cards | length }}
    </div>


    <!-- ===== Card Grid ===== -->
    <div id="collection">

        {% for card in cards %}
        <div 
            id="card-{{ card.id }}"
            class="card"
            data-name="{{ card.name | lower }}"
            data-color="{{ card.color_identity }}"
            data-image="{{ card.image_url }}"
            data-preview="{{ card.image_large or card.image_url }}"
        >

            <!-- Card Image -->
            {% if card.image_url %}
                <img src="{{ card.image_url }}" 
                class="card-img">
            {% endif %}

            <!-- Card Name -->
            <strong  class="card-info">
                {{ card.name }}
            </strong>

            <!-- Quantity Controls -->
            <div class="card-controls">

                <button class="qty-btn" data-id="{{ card.id }}" data-change="-1">-</button>

                <span id="qty-{{ card.id }}">
                    {{ card.quantity }}
                </span>

                <button class="qty-btn" data-id="{{ card.id }}" data-change="1">+</button>

            </div>

        </div>
        {% endfor %}

    </div>
</div>

<!-- =========================
     MODALS
     ========================= -->
<div id="cardModal" class="modal hidden">
<!-- ===== Add Card Modal ===== -->

    <h3>Add Card</h3>

    <!-- =========================
     CARD INPUT WITH AUTOSUGGEST
     ========================= -->
    <div class="input-wrapper">

        <input 
            id="cardInput" 
            placeholder="Enter card name"
            autocomplete="off"
        >

        <!-- Suggestions dropdown -->
        <div id="suggestionsBox" class="suggestions-box hidden"></div>

    </div>

    <br><br>

    <button class="button" id="addCardBtn">Add</button>

    <br><br>

    <button class="button" data-close-modal="cardModal">Close</button>
</div>


<!-- ===== Preview Modal ===== -->
<div id="previewModal" class="modal hidden preview-modal">

    <img id="previewImage">

</div>


<!-- =========================
     CONFIG (FROM FLASK)
     ========================= -->
<script>
    window.APP_CONFIG = {
        added: "{{ added }}"
    };
</script>


<!-- MAIN JS -->
<script type="module" src="{{ url_for('static', filename='main.js') }}"></script>

</body>
</html>
